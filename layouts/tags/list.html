{{ define "main" }}

<div>
  <section class="content-column">
    <h1>{{ .Title }}</h1>
    <article>
      <ul>
        {{ range .Pages }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </li>
        {{ end }}
      </ul>
    </article>
  </section>
</div>

{{ end }}
