{{ define "main" }}

<div class="posts__container">
  <section class="content-column">
    <h1>Tags</h1>
    <article class="spacer-top-10">
      <ul class="inline">
        {{ range .Pages }}
          <li class="spacer-right-4">
            <a href="{{ .RelPermalink }}" class="no-underline">{{ .Title }}</a>
          </li>
        {{ end }}
      </ul>
    </article>
  </section>

  {{ partial "blog_sidebar.html" . }}
</div>

{{ end }}
