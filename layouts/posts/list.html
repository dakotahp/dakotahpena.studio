{{ define "main" }}

<div>
  <section class="content-column">
    <a href="/">&#x2190; Back to Home</a>
  </section>
</div>

<div class="post__container content-column">
  {{ range .Paginator.Pages }}
    <article class="post__content">
      <time datetime="{{ .Date }}">{{ .Date.Format $.Site.Params.dateFormat }}</time>

      <h1 class="post__title">
        <a href="{{ .RelPermalink }}" class="no-underline">{{ .Title }}</a>
      </h1>

      <div>
        <a class="link__read_more" href="{{ .RelPermalink }}">Read more</a>
      </div>
    </article>
  {{ end }}
</div>

{{ end }}
